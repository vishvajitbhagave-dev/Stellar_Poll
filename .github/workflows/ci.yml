name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Frontend Tests & Build ─────────────────────────────────────────
  frontend:
    name: Frontend - Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm test

      - name: Build frontend for production
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/

  # ── Job 2: Smart Contract Build ────────────────────────────────────────────
  smart-contract:
    name: Smart Contract - Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Add wasm32v1-none target
        run: rustup target add wasm32v1-none

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contract/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contract/Cargo.toml') }}

      - name: Install Stellar CLI
        run: cargo install stellar-cli --features opt --locked || true

      - name: Build smart contract
        run: |
          cd contract
          cargo build --target wasm32v1-none --release
          echo "✅ Smart contract built successfully"

      - name: Upload contract artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-contract-wasm
          path: contract/target/wasm32v1-none/release/*.wasm

  # ── Job 3: Deploy Frontend (only on main branch) ──────────────────────────
  deploy:
    name: Deploy Frontend
    needs: [frontend, smart-contract]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build for production
        run: npm run build

      - name: Deploy success
        run: echo "✅ Frontend and Smart Contract CI/CD pipeline completed successfully!"